<!DOCTYPE html>
<html>
<head>
  <title>Maha Land Startup Tool - Final</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet-draw/dist/leaflet.draw.css"/>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(-45deg,#1e3c72,#2a5298,#1cb5e0,#000046);
      background-size: 400% 400%;
      animation: gradientBG 12s ease infinite;
      color: #fff;
    }

    @keyframes gradientBG {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    h2 {text-align:center;padding:15px;}

    #map {
      height:65vh;
      border-radius:15px;
      margin:10px;
      box-shadow:0 15px 40px rgba(0,0,0,0.4);
    }

    .panel {
      margin:15px;
      padding:25px;
      border-radius:20px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(20px);
    }

    input, select, button {
      padding:12px;
      margin:8px 0;
      width:100%;
      border-radius:10px;
      border:none;
    }

    button {
      background: linear-gradient(45deg,#00c6ff,#0072ff);
      color:white;
      cursor:pointer;
    }

    #result, #priceResult {
      margin-top:10px;
      padding:12px;
      border-radius:12px;
      background: rgba(255,255,255,0.2);
    }

    .dark {background:#000;}
  </style>
</head>

<body>

<h2>🌏 Maharashtra Land Startup Tool (Final Ready)</h2>

<div id="map"></div>

<div class="panel">

<h3>📐 Area Details</h3>
<div id="result">Draw polygon to calculate area</div>

<h3>💰 Price Calculator</h3>

<input type="number" id="price" placeholder="Price per unit">

<select id="unitSelect">
<option value="sqm">Sq Meter</option>
<option value="sqft">Sq Feet</option>
<option value="acre">Acres</option>
<option value="hectare">Hectares</option>
<option value="guntha">Guntha</option>
</select>

<button onclick="calculatePrice()">Calculate Total Price</button>

<div id="priceResult"></div>

<h3>⚙ Actions</h3>

<button onclick="getLocation()">Use My Live Location</button>
<button onclick="toggleDark()">Toggle Dark Mode</button>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/leaflet-geometryutil/src/leaflet.geometryutil.js"></script>

<script>

let map = L.map('map',{minZoom:3,maxZoom:22})
.setView([20.5937,78.9629],5);

let drawnItems=new L.FeatureGroup().addTo(map);

let street=L.tileLayer(
'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',
{maxZoom:22}
).addTo(map);

let satellite=L.tileLayer(
'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}',
{maxZoom:22}
);

L.control.layers({
"Street":street,
"Satellite":satellite
}).addTo(map);

map.addControl(new L.Control.Draw({
draw:{
polygon:true,
polyline:false,
rectangle:false,
circle:false,
marker:false,
circlemarker:false
},
edit:{featureGroup:drawnItems}
}));

let currentLayer=null;
let currentArea=0;

map.on(L.Draw.Event.CREATED,function(e){

drawnItems.clearLayers();

currentLayer=e.layer;

drawnItems.addLayer(currentLayer);

updateArea();

});

function updateArea(){

if(!currentLayer)return;

let latlngs=currentLayer.getLatLngs()[0];

currentArea=L.GeometryUtil.geodesicArea(latlngs);

let sqm=currentArea;
let sqft=sqm*10.7639;
let acres=sqft/43560;
let hectares=sqm/10000;
let guntha=sqm/101.17;

document.getElementById("result").innerHTML=
"Sq Meter: "+sqm.toFixed(2)+"<br>"+
"Sq Feet: "+sqft.toFixed(2)+"<br>"+
"Acres: "+acres.toFixed(4)+"<br>"+
"Hectares: "+hectares.toFixed(4)+"<br>"+
"Guntha: "+guntha.toFixed(2);

}

function calculatePrice(){

if(!currentArea){
alert("Draw plot first");
return;
}

let price=parseFloat(
document.getElementById("price").value
);

let unit=document.getElementById("unitSelect").value;

if(!price)return;

let total=0;

switch(unit){

case 'sqm':
total=price*currentArea;
break;

case 'sqft':
total=price*(currentArea*10.7639);
break;

case 'acre':
total=price*((currentArea*10.7639)/43560);
break;

case 'hectare':
total=price*(currentArea/10000);
break;

case 'guntha':
total=price*(currentArea/101.17);
break;

}

document.getElementById("priceResult").innerHTML=
"Total Price: "+total.toFixed(2);

}

// LOCATION

let userMarker=null;

function getLocation(){

if(!navigator.geolocation){
alert("Geolocation not supported");
return;
}

navigator.geolocation.getCurrentPosition(

function(pos){

const lat=pos.coords.latitude;
const lng=pos.coords.longitude;

if(!userMarker){

userMarker=L.marker([lat,lng])
.addTo(map)
.bindPopup("📍 Your Location")
.openPopup();

}else{

userMarker.setLatLng([lat,lng]);

}

map.setView([lat,lng],18);

}

);

}

// AUTO LOCATION

window.onload=function(){

setTimeout(function(){

getLocation();

},1500);

};

function toggleDark(){
document.body.classList.toggle("dark");
}

</script>

</body>
</html>
